<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Users - i404 Panel</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="header">
  i404 Panel - Users
</div>

<div class="sidebar">
  <a href="index.html">Dashboard</a>
  <a href="users.html">Users</a>
  <a href="#">Subscriptions</a>
  <a href="#">Settings</a>
  <a href="#">Logs</a>
</div>

<div class="main">

  <h1>USERS PAGE</h1>
  
  <div class="card">
    <h2>Users List</h2>

    <div id="usersList">
      Loading...
    </div>

  </div>

</div>

<script>

fetch('/allusers')
.then(r => r.json())
.then(users => {

  let html = '';

  users.forEach(user => {

    html += `
      <div class="card">
        <b>${user.username}</b><br>
        Traffic: ${user.traffic} GB<br>
        Expire: ${user.expire_days} Days
      </div>
    `;

  });

  document.getElementById('usersList').innerHTML = html;

});

</script>

</body>
</html>
