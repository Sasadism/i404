<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>i404 Panel</title>
<link rel="stylesheet" href="style.css">
</head>
  
<script>
fetch('/users')
.then(r => r.json())
.then(data => {
  document.getElementById('totalUsers').innerText = data.total;
});
</script>
  
<body>

<div class="header">
  i404 Panel
</div>

<div class="sidebar">
  <a href="#">Dashboard</a>
  <a href="users.html">Users</a>
  <a href="#">Subscriptions</a>
  <a href="#">Settings</a>
  <a href="#">Logs</a>
</div>

<div class="main">

  <div class="card">
    <h2>Total Users</h2>
    <p> <p id="totalUsers">Loading...</p></p>
  </div>

  <div class="card">
    <h2>Active Users</h2>
    <p>0</p>
  </div>

  <div class="card">
    <h2>Subscriptions</h2>
    <p>0</p>
  </div>

</div>
  
</body>
</html>
